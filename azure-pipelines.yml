trigger:
- main

pool:
    vmImage: 'windows-2022'  # name of the pool to run this job in
    demands: 
      - msbuild
      - visualstudio
      - vstest

variables:
  solution: '**/*.sln'
  buildPlatform: 'x86|x64|ARM'
  buildConfiguration: 'Release'

jobs:
  - job: x64_build
    steps:
    - task: VSBuild@1
      inputs:
        platform: 'x64'
        solution: '$(solution)'
        configuration: '$(buildConfiguration)'

    - task: ComponentGovernanceComponentDetection@0
      inputs:
        scanType: 'Register'
        verbosity: 'Verbose'
        alertWarningLevel: 'Low'

    - task: SFP.build-tasks.custom-build-task-1.EsrpCodeSigning@5 
      displayName: 'ESRP CodeSigning' 
      inputs: 
        ConnectedServiceName: 'Log-Monitor' 
        AppRegistrationClientId: '9c3f7d08-a539-4e8b-9363-89d759005698' 

        AppRegistrationTenantId: '72f988bf-86f1-41af-91ab-2d7cd011db47' 
        AuthAKVName: 'Log-Monitor-KV' 
        AuthCertName: 'LogMonitor2-SSL-Autorotation' 
        AuthSignCertName: 'LogMonitor2'

        FolderPath: MyApp 
        Pattern: '*.dll' 
        SessionTimeout: 90 
        ServiceEndpointUrl: 'https://api.esrp.microsoft.com/api/v2' 
        MaxConcurrency: 25

    - task: VisualStudioTestPlatformInstaller@1
      inputs:
        packageFeedSelector: 'nugetOrg'
        versionSelector: 'latestPreRelease'

    - task: VSTest@2
      inputs:
        testSelector: 'testAssemblies'
        testAssemblyVer2: '**\*test*.dll'
        searchFolder: '$(System.DefaultWorkingDirectory)' 
        runOnlyImpactedTests: false
        runInParallel: false
        rerunFailedTests: true
        rerunMaxAttempts: 3
    
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.SourcesDirectory)\LogMonitor\x64\Release\'
        artifactType: 'pipeline'
        artifactName: '64-bit'
    
  - job: x86_build
    steps:
      - task: VSBuild@1
        inputs:
          platform: 'x86'
          solution: '$(solution)'
          configuration: '$(buildConfiguration)'

      - task: ComponentGovernanceComponentDetection@0
        inputs:
          scanType: 'LogOnly'
          verbosity: 'Verbose'
          alertWarningLevel: 'High'

      - task: SFP.build-tasks.custom-build-task-1.EsrpCodeSigning@5 
        displayName: 'ESRP CodeSigning' 
        inputs: 
          ConnectedServiceName: 'Log-Monitor' 
          AppRegistrationClientId: '9c3f7d08-a539-4e8b-9363-89d759005698' 

          AppRegistrationTenantId: '72f988bf-86f1-41af-91ab-2d7cd011db47' 
          AuthAKVName: 'Log-Monitor-KV' 
          AuthCertName: 'LogMonitor2-SSL-Autorotation' 
          AuthSignCertName: 'LogMonitor2'

          FolderPath: MyApp 
          Pattern: '*.dll' 
          SessionTimeout: 90 
          ServiceEndpointUrl: 'https://api.esrp.microsoft.com/api/v2' 
          MaxConcurrency: 25

      - task: VisualStudioTestPlatformInstaller@1
        inputs:
          packageFeedSelector: 'nugetOrg'
          versionSelector: 'latestPreRelease'

      - task: VSTest@2
        inputs:
          testSelector: 'testAssemblies'
          testAssemblyVer2: '**\*test*.dll'
          searchFolder: '$(System.DefaultWorkingDirectory)' 
          runOnlyImpactedTests: false
          runInParallel: false
          rerunFailedTests: true
          rerunMaxAttempts: 3
      
      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: '$(Build.SourcesDirectory)\LogMonitor\Release\'
          artifactType: 'pipeline'
          artifactName: '32-bit'
